<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>took - 할 일 캡처 및 구글 캘린더 자동 등록</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #e1e1e6;
            --text-muted: #a8a8b3;
            --accent-color: #4f46e5;
            --accent-hover: #6366f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding: 40px 20px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 10px;
            letter-spacing: -0.05em;
        }

        .logo span {
            color: var(--accent-color);
        }

        .tagline {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .features {
            display: grid;
            gap: 20px;
            margin-bottom: 40px;
            text-align: left;
        }

        .feature-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #29292e;
        }

        .feature-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: var(--text-color);
        }

        .feature-card p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--accent-color);
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s;
            margin-bottom: 40px;
        }

        .cta-button:hover {
            background-color: var(--accent-hover);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid #29292e;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: underline;
            margin-left: 15px;
        }

        footer a:hover {
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">took<span>.</span></div>
        <p class="tagline">생각난 즉시 캡처하고,<br>구글 캘린더에 알아서 등록해 주는 스마트한 생산성 도구</p>

        <div class="features">
            <div class="feature-card">
                <h3>⚡ 빠른 태스크 캡처</h3>
                <p>복잡한 절차 없이 아이디어나 할 일을 앱 실행 즉시 빠르게 기록합니다.</p>
            </div>
            <div class="feature-card">
                <h3>📅 구글 캘린더 자동 연동</h3>
                <p>앱 내에서 기록한 일정을 본인의 Google Calendar 계정과 실시간으로 동기화하여 관리할 수 있습니다.</p>
            </div>
        </div>

        <a href="https://play.google.com/store/apps/details?id=com.dd.took&hl=ko" class="cta-button" target="_blank">Google Play에서 다운로드</a>
    </div>

    <footer>
        <span>&copy; 2026 took. All rights reserved.</span>
        <a href="https://dogdduddy.github.io/took_privacy/" target="_blank">개인정보처리방침 (Privacy Policy)</a>
    </footer>

</body>
</html>
